    <meta property="og:type" content="website" />

      property="og:image"

    />
    <meta property="og:image:width" content="1200" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="YES or NO 타로" />
    <meta name="twitter:description" content="해결! 양자택일 타로" />
    <meta
      name="twitter:image"
      content="https://yesorno-tarot.vercel.app/og-image.png"
    />

    <title>YES or NO 타로</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="style.css" />
    <style>
      /* ── 공유 독려 ── */
      .share-nudge {
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
        margin-bottom: 0.85rem;
        padding: 0.7rem 0.9rem;
        border: 1.5px solid var(--border);
        background: var(--bg2);
        transition: all 0.2s;
      }
      .share-nudge-main {
        font-family: 'IsYun', cursive;
        font-size: 0.95rem;
        color: var(--fg);
        font-weight: 700;
      }
      .share-nudge-bonus {
        font-family: 'IsYun', cursive;
        font-size: 0.82rem;
        color: var(--fg3);
      }
      .lang-btn {
        background: transparent;
        border: 1.5px solid var(--border);
        color: var(--fg2);
        font-family: 'Caveat', cursive;
        font-size: 0.95rem;
        font-weight: 700;
        padding: 0.2rem 0.6rem;
        cursor: pointer;
        transition: all 0.15s;
        letter-spacing: 0.05em;
      }
      .lang-btn:hover {
        background: var(--bg2);
        color: var(--fg);
      }
      .share-kakao {
        background: #FEE500;
        border-color: #FEE500;
        color: #1a1a1a;
      }
      .share-kakao:hover {
        background: #e6cf00;
      }
    </style>
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- 카카오 SDK -->
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.8.0/kakao.min.js" integrity="sha384-PFHeU/4gvSH8kpvhrigAPfZGBDPs372JfeIVTl1wLfJmLRWr9HCKE6rCTFMuMnA" crossorigin="anonymous"></script>
  </head>
  <body id="app">
    <!-- Google Tag Manager (noscript) -->
    <noscript
      ><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-NKX5RSN2"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe
    ></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <!-- ── 쿠키 동의 배너 ── -->
    <div class="consent-banner" id="consentBanner">
      <p>
        이 사이트는 방문 통계를 위해 Google Analytics를 사용합니다. 자세한
        내용은 <a href="privacy.html" target="_blank">개인정보처리방침</a>을
        확인하세요.
      </p>
      <div class="consent-btns">
        <button class="consent-btn decline" onclick="handleConsent(false)">
          거부
        </button>
        <button class="consent-btn accept" onclick="handleConsent(true)">
          동의
        </button>
      </div>
    </div>

    <!-- ── 이미지 저장용 숨겨진 카드 ── -->
    <div id="share-card">
      <div class="sc-title">YES or NO 타로</div>
      <div class="sc-card"><svg id="sc-svg" viewBox="0 0 200 320"></svg></div>
      <div class="sc-verdict" id="sc-verdict"></div>
      <div class="sc-badge" id="sc-badge"></div>
      <div class="sc-question hidden" id="sc-question"></div>
      <div class="sc-desc" id="sc-desc"></div>
      <div class="sc-footer" id="sc-footer">
        https://yesorno-tarot.vercel.app/ · 해결! 양자택일 타로
      </div>
    </div>

    <div class="wrap">
      <!-- 상단 바 -->
      <div class="top-bar">
        <button class="lang-btn" id="langToggleBtn" onclick="toggleLang()">EN</button>
        <div class="toggle-wrap" onclick="toggleDark()">
          <span class="toggle-label" id="toggleLabel">🌙 다크</span>
          <div class="toggle-track"><div class="toggle-thumb"></div></div>
        </div>
      </div>

      <!-- 헤더 -->
      <div class="title">YES or NO</div>
      <div class="subtitle">해결! <span class="hl">양자택일</span>타로</div>

      <!-- 남은 횟수 -->
      <div class="quota-badge" id="quotaBadge">
        <div class="quota-dots" id="quotaDots"></div>
        <span id="quotaText"></span>
      </div>

      <!-- 폼 -->
      <div id="formArea">
        <!-- 애드센스 자리 A (폼 위) -->
        <div class="ad-slot" id="adSlotA">
          <!-- <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXX" data-ad-slot="XXXXXXXXXX" data-ad-format="auto" data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script> -->
        </div>

        <div class="field-label">고민 종류 (선택 사항)</div>
        <select class="category-select" id="catSelect">
          <option value="">선택 안 함</option>
          <option value="연애">💕 연애</option>
          <option value="인간관계">🤝 인간관계</option>
          <option value="직장·커리어">💼 직장 · 커리어</option>
          <option value="공부·시험">📚 공부 · 시험</option>
          <option value="돈·재테크">💰 돈 · 재테크</option>
          <option value="건강">🌿 건강</option>
          <option value="그 외">✨ 그 외</option>
        </select>
        <!-- 
        <div class="field-label">질문 (선택 사항)</div>
        <div class="q-wrap">
          <textarea
            class="question-input"
            id="qInput"
            rows="2"
            placeholder="ex. 오늘 점심 김치찌개 먹을까요?"
            maxlength="100"
            oninput="updateCount()"
          ></textarea>
          <span class="char-count" id="charCount">0 / 100</span>
        </div> -->

        <button class="draw-btn" id="drawBtn" onclick="drawCard()">
          <span id="drawBtnText">카드 뽑기 →</span>
        </button>
        <div class="quota-done hidden" id="quotaDone">
          내일 다시 와주세요 🌙<br /><span
            style="font-size: 0.85rem; opacity: 0.7"
            >오늘의 세 장은 모두 뽑았어요</span
          >
        </div>
      </div>

      <!-- 카드 -->
      <div class="card-stage">
        <div class="card-container">
          <div class="card-inner" id="cardInner">
            <div class="card-face card-back">
              <div class="card-back-inner">
                <div class="card-back-q">?</div>
                <div class="card-back-txt">TAROT</div>
              </div>
            </div>
            <div class="card-face card-front" id="cardFront"></div>
          </div>
        </div>

        <!-- 결과 -->
        <div id="resultArea" class="result-block hidden">
          <div class="result-verdict" id="resultVerdict"></div>
          <div class="result-badge" id="resultBadge"></div>
          <div class="divider-wrap">
            <svg viewBox="0 0 480 18" preserveAspectRatio="none">
              <path
                id="divPath"
                d="M0 9 Q60 3 120 9 Q180 15 240 9 Q300 3 360 9 Q420 15 480 9"
                fill="none"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
          </div>
          <div class="result-desc" id="resultDesc"></div>

          <!-- 애드센스 자리 B (결과와 공유 버튼 사이) -->
          <div class="ad-slot" id="adSlotB">
            <!-- <ins class="adsbygoogle" ...></ins> -->
          </div>

          <!-- 공유 섹션 -->
          <div class="share-section">
            <!-- 질문 포함 체크박스 — 질문 입력했을 때만 보임 -->
            <div class="include-q-wrap hidden" id="includeQWrap">
              <label class="include-q-label">
                <input type="checkbox" id="includeQCheck" checked />
                질문 포함해서 이미지로 저장하기
              </label>
            </div>
            <!-- 공유 독려 -->
            <div class="share-nudge">
              <span class="share-nudge-main" id="shareNudgeMain">친구한테도 공유해보세요!</span>
              <span class="share-nudge-bonus" id="shareNudgeBonus">공유하면 오늘 한 번 더 뽑을 수 있어요 🎁</span>
            </div>
            <div class="share-row">
              <button class="share-btn primary" onclick="shareToX()">
                <svg
                  width="13"
                  height="13"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                >
                  <path
                    d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.734l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"
                  />
                </svg>
                <span id="shareXText">X 공유</span>
              </button>
              <button class="share-btn" onclick="saveImage()">
                <svg
                  width="13"
                  height="13"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                  <polyline points="7 10 12 15 17 10" />
                  <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
                이미지 저장
              </button>
              <button class="share-btn" onclick="shareToInstagram()">
                <svg
                  width="13"
                  height="13"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                >
                  <path
                    d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"
                  />
                </svg>
                인스타
              </button>
              <button class="share-btn" onclick="copyResult()">복사</button>
              <button class="share-btn share-kakao" onclick="shareToKakao()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M12 3C6.48 3 2 6.48 2 10.8c0 2.7 1.44 5.1 3.66 6.6L4.8 21l4.08-2.1c1.02.27 2.1.42 3.12.42 5.52 0 10-3.48 10-7.8S17.52 3 12 3z"/>
                </svg>
                카카오
              </button>
            </div>
            <button class="again-btn" id="againBtn" onclick="resetCard()">
              ↺ 다시 뽑기
            </button>
          </div>
        </div>
      </div>

      <footer>
        <a href="privacy.html" id="privacyLink">개인정보처리방침</a> · © 2026 YES or NO 타로
      </footer>
    </div>

    <div class="toast" id="toast"></div>

    <script src="config.js"></script>
    <script src="cards.js"></script>
    <script src="app.js"></script>
  </body>
</html>
